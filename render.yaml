# Blueprint do Render. Com isso, no painel você cria um "Blueprint"
# apontando pro repositório e ele já sobe configurado.
services:
  - type: web
    name: ermo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: SECRET_KEY
        generateValue: true
